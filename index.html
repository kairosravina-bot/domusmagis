<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI V2: MENU</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="ojo.js"></script>
</head>
<body>
    <!-- PANTALLA INICIAL -->
    <div id="p-inicio" class="pantalla">
        <div style="display:flex; flex-direction:column; align-items:center; gap: 10px;">
            
            <!-- LOGO ESCUDO -->
            <div style="width: 220px; height: auto; margin-bottom: -15px;">
                <img src="logoescudo.png" style="width: 100%; height: auto; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));">
            </div>
            
            <div>
                <!-- TITULO UNIFICADO EN DORADO -->
                <h1 style="font-size: 65px; line-height:0.85; text-align:center; color: #d4af37; margin: 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); font-family: 'Cinzel', serif; font-weight: 900;">
                    DOMUS<br>MAGI
                </h1>
                <p style="letter-spacing:5px; color:#0f0; text-align:center; margin: 10px 0 0 0; font-size: 16px; font-weight:900; text-shadow:0 0 10px #0f0;">REVELATIONS V3</p>
            </div>
            
            <button class="btn-master" style="width: 280px; border-color: #fff; background: linear-gradient(to bottom, #500, #200); margin-top: 30px;" onclick="entrarGrimorio()">ENTER</button>
        </div>
    </div>

    <!-- MENU PRINCIPAL -->
    <div id="p-menu-principal" class="pantalla oculto">
        <video id="intro-video" src="https://kairosravina-bot.github.io/domusmagis/presentacion.mp4" playsinline webkit-playsinline muted style="width:100%; border:2px solid #d4af37; border-radius:10px; margin-bottom:20px; opacity:0.8;"></video>
        
        <div class="fila-juego">
            <button class="btn-jugar" onclick="window.location.href='batalla.html'">⚔️ FIRST BLOOD 1</button>
        </div>
        
        <div class="fila-juego">
            <button class="btn-jugar" style="background:#333; border-color:#555;" onclick="window.location.href='dados.html'">🎲 DADOS</button>
        </div>

        <div class="fila-juego">
            <button class="btn-jugar" style="background:#1a4d4d; border-color:#00ff99;" onclick="window.location.href='flipbook.html'">📚 CATÁLOGO</button>
        </div>

        <div class="fila-juego">
            <button class="btn-jugar" style="background:#500; border-color:#fff;" onclick="salirApp()">❌ EXIT</button>
        </div>
    </div>

    <script>
        function entrarGrimorio() {
            document.getElementById('p-inicio').classList.add('oculto');
            document.getElementById('p-menu-principal').classList.remove('oculto');
            const v = document.getElementById('intro-video');
            if(v) { 
                v.muted = false; 
                v.play().catch(e => console.log("Interacción requerida")); 
            }
        }

        function salirApp() {
            if (confirm("¿Deseas salir del juego?")) {
                window.close();
                setTimeout(() => {
                    window.location.href = "about:blank";
                }, 300);
            }
        }
    </script>
</body>
</html>
