<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI - INSTRUCCIONES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .flipbook {
            width: 100%;
            max-width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .page {
            display: none;
            width: 100%;
            height: auto;
        }
        
        .page.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .page img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }
        
        button {
            background: linear-gradient(to bottom, #8b6f47, #3a2a0a);
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: linear-gradient(to bottom, #a0845a, #4a3a1a);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .page-counter {
            color: #d4af37;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            border: 2px solid #d4af37;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: 1px;
            font-family: 'Cinzel', serif;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="flipbook">
        <div class="page active" id="page-1">
            <img src="hoja_1.jpg" alt="Página 1">
        </div>
        <div class="page" id="page-2">
            <img src="hoja_2.jpg" alt="Página 2">
        </div>
        <div class="page" id="page-3">
            <img src="hoja_3.jpg" alt="Página 3">
        </div>
        <div class="page" id="page-4">
            <img src="hoja_4.jpg" alt="Página 4">
        </div>
        <div class="page" id="page-5">
            <img src="hoja_5.jpg" alt="Página 5">
        </div>
        <div class="page" id="page-6">
            <img src="hoja_6.jpg" alt="Página 6">
        </div>
    </div>
    
    <div class="controls">
        <button onclick="prevPage()">⬅️ ANTERIOR</button>
        <div class="page-counter">
            <span id="current-page">1</span> / 6
        </div>
        <button onclick="nextPage()">SIGUIENTE ➡️</button>
        <button onclick="exitInstructions()">SALIR</button>
    </div>
    
    <script>
        let currentPage = 1;
        const totalPages = 6;
        
        function showPage(n) {
            const pages = document.querySelectorAll('.page');
            
            if (n > totalPages) {
                currentPage = totalPages;
            } else if (n < 1) {
                currentPage = 1;
            } else {
                currentPage = n;
            }
            
            pages.forEach(page => page.classList.remove('active'));
            document.getElementById(`page-${currentPage}`).classList.add('active');
            document.getElementById('current-page').textContent = currentPage;
        }
        
        function nextPage() {
            showPage(currentPage + 1);
        }
        
        function prevPage() {
            showPage(currentPage - 1);
        }
        
        function exitInstructions() {
            window.history.back();
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'Escape') exitInstructions();
        });
        
        showPage(1);
    </script>
</body>
</html>
