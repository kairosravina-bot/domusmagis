<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI - INSTRUCCIONES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: #0f0f0f;
            border: 3px solid #d4af37;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to bottom, #1a1a1a, #0f0f0f);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
        }
        
        .header h1 {
            color: #d4af37;
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }
        
        .flipbook {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            max-height: 70vh;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .page {
            display: none;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(to right, #1a1a1a, #0f0f0f);
            border-top: 2px solid #d4af37;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(to bottom, #8b6f47, #3a2a0a);
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: linear-gradient(to bottom, #a0845a, #4a3a1a);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .page-counter {
            color: #d4af37;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            min-width: 80px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .btn-back {
            background: linear-gradient(to bottom, #6b5436, #3a2a0a);
        }
        
        .btn-next {
            background: linear-gradient(to bottom, #8b6f47, #3a2a0a);
        }
        
        .btn-exit {
            background: linear-gradient(to bottom, #8b4547, #3a1a1a);
            margin-left: auto;
        }
        
        .btn-exit:hover {
            box-shadow: 0 0 15px rgba(255, 100, 100, 0.5);
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }
            
            button {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .page-counter {
                font-size: 14px;
            }
            
            .controls {
                padding: 15px;
                gap: 10px;
            }
        }
    </style>
</head>

        <div class="header">
            <h1>📖 INSTRUCCIONES DOMUS MAGI</h1>
        </div>
