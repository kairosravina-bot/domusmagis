<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DOMUS MAGI - INSTRUCCIONES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #flipbook-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 60px 10px 10px 10px;
        }

        #flipbook-image {
            width: 100%;
            max-width: 95vw;
            height: auto;
            max-height: calc(100vh - 140px);
            object-fit: contain;
            border: 3px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            width: 100%;
            flex-wrap: nowrap;
        }

        button {
            background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
            border: 2px solid #d4af37;
            color: #ffd700;
            padding: 10px 18px;
            font-size: 14px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #000;
            white-space: nowrap;
            flex: 1;
            max-width: 140px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #ffd700;
            font-size: 12px;
            font-weight: 700;
            text-shadow: 1px 1px 3px #000;
            text-align: center;
            flex: 0 0 auto;
            min-width: 80px;
        }

        .back-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #500;
            border-color: #fff;
            color: #fff;
            padding: 8px 12px;
            font-size: 12px;
            max-width: 90px;
        }

        @media (max-width: 480px) {
            #flipbook-container {
                padding: 50px 8px 8px 8px;
            }

            button {
                padding: 8px 12px;
                font-size: 12px;
                max-width: 110px;
            }

            .page-info {
                font-size: 11px;
                min-width: 70px;
            }

            .controls {
                gap: 8px;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="flipbook-container">
        <button class="back-btn" onclick="volverMenu()">← VOLVER</button>
        
        <img id="flipbook-image" src="hoja 1.jpg" alt="Instrucciones Domus Magi">
        
        <div class="controls">
            <button id="prev-btn" onclick="paginaAnterior()">◀ ANTERIOR</button>
            <div class="page-info">
                <span id="page-number">Página 1</span>
            </div>
            <button id="next-btn" onclick="paginaSiguiente()">SIGUIENTE ▶</button>
        </div>
    </div>

    <script>
        const pages = [
            { num: 1, name: 'hoja 1.jpg', title: 'Página 1' },
            { num: 2, name: 'hoja 2.jpg', title: 'Página 2' },
            { num: 3, name: 'hoja 3.jpg', title: 'Página 3' },
            { num: 4, name: 'hoja 4.jpg', title: 'Página 4' },
            { num: 5, name: 'hoja 5.jpg', title: 'Página 5' },
            { num: 6, name: 'hoja 6.jpg', title: 'Página 6' },
        ];

        let currentPage = 0;

        const flipImg = document.getElementById('flipbook-image');
        const pageNum = document.getElementById('page-number');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function actualizarPagina() {
            flipImg.src = pages[currentPage].name;
            pageNum.textContent = `${pages[currentPage].title} (${currentPage + 1}/${pages.length})`;
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
        }

        function paginaSiguiente() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                actualizarPagina();
            }
        }

        function paginaAnterior() {
            if (currentPage > 0) {
                currentPage--;
                actualizarPagina();
            }
        }

        function volverMenu() {
            window.location.href = 'index.html';
        }

        // Teclado: Flechas para navegar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') paginaSiguiente();
            if (e.key === 'ArrowLeft') paginaAnterior();
        });

        // Inicializar
        actualizarPagina();
    </script>
</body>
</html>
