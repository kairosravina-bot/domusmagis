<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI: ORACULO TESSERAE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-dado-sel {
            width: 100%; height: 90px;
            background: #222; border: 1px solid #444; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; color: #666; transition: all 0.2s;
            font-size: 40px !important; /* Letras más grandes */
            font-family: 'Cinzel', serif;
        }
        .btn-dado-sel.tageado { 
            background: #400; border: 2px solid #f00; color: #fff; 
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }
        .btn-dado-sel:active { transform: scale(0.95); }
    </style>
</head>
<body style="background: url('BG_PIEDRA.jpg') no-repeat center center fixed; background-size: cover;">
    
    <div class="pantalla">
        <div style="background:rgba(0,0,0,0.75); padding:30px; border:2px solid gold; border-radius:15px; text-align:center; max-width: 400px; animation: fadeIn 0.5s ease-out;">
            <h1 style="color:var(--borde-dorado); font-size:42px; margin-top: 0; text-shadow: 0 0 20px gold; font-family: 'Cinzel', serif;">ORACULO TESSERAE</h1>
            <p style="color: #aaa; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px;">CONSULTA EL DESTINO</p>
            
            <div class="dados-container" style="margin: 20px auto; animation: slideUp 0.6s ease-out 0.2s both;">
                <video id="video-dados-solo" class="video-dados" src="https://kairosravina-bot.github.io/domusmagis/Dados.mp4" playsinline webkit-playsinline muted></video>
                <div id="layer-valor-solo" class="layer-valor" style="display:none;">0</div>
            </div>

            <!-- BOTÓN 1 DADO -->
            <div style="width: 100%; max-width: 300px; margin: 0 auto 15px auto; animation: slideUp 0.6s ease-out 0.3s both;">
                <div class="btn-dado-sel" id="btn-solo-1" onclick="tirarDados(1)"><strong>1D</strong></div>
            </div>

            <!-- GRID DE DADOS (2, 3, 4, 5) -->
            <div class="grid-dados" style="margin: 0 auto 20px auto; animation: slideUp 0.6s ease-out 0.35s both;">
                <div class="btn-dado-sel" id="btn-solo-2" onclick="tirarDados(2)"><strong>2D</strong></div>
                <div class="btn-dado-sel" id="btn-solo-3" onclick="tirarDados(3)"><strong>3D</strong></div>
                <div class="btn-dado-sel" id="btn-solo-4" onclick="tirarDados(4)"><strong>4D</strong></div>
                <div class="btn-dado-sel" id="btn-solo-5" onclick="tirarDados(5)"><strong>5D</strong></div>
            </div>

            <button class="btn-master" style="margin-top:20px; background:#333; width: 100%; max-width: 350px; animation: slideUp 0.6s ease-out 0.4s both;" onclick="window.location.href='index.html'">⬅️ VOLVER</button>
        </div>
    </div>

    <script>
        function tirarDados(n) {
            [1,2,3,4,5].forEach(i => {
                const btn = document.getElementById('btn-solo-'+i);
                if (btn) btn.classList.remove('tageado');
            });

            const btnSeleccionado = document.getElementById('btn-solo-'+n);
            if (btnSeleccionado) btnSeleccionado.classList.add('tageado');

            const vid = document.getElementById('video-dados-solo');
            const layer = document.getElementById('layer-valor-solo');
            
            layer.style.display = 'none';
            vid.currentTime = 0;
            vid.play().catch(e => console.log(e));
            
            vid.onended = () => {
                let total = 0;
                for(let i = 0; i < n; i++) total += Math.floor(Math.random() * 6) + 1;
                layer.innerText = total;
                layer.style.display = 'flex';
            };
        }
    </script>
</body>
</html>
