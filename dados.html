<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI: ORACULO TESSERAE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: url('BG_PIEDRA.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .pantalla {
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .contenedor-dados {
            background: rgba(0, 0, 0, 0.85);
            padding: clamp(20px, 5vw, 30px);
            border: 2px solid gold;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .contenedor-dados h1 {
            color: var(--borde-dorado, gold);
            font-size: clamp(28px, 7vw, 42px);
            margin: 0;
            text-shadow: 0 0 20px gold;
            font-family: 'Cinzel', serif;
        }

        .contenedor-dados p {
            color: #aaa;
            font-size: clamp(10px, 3vw, 12px);
            letter-spacing: 2px;
            margin: 0;
        }

        .dados-container {
            width: 100%;
            max-width: 350px;
            height: 250px;
            position: relative;
            margin: 15px 0;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.9);
        }

        .video-dados {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .layer-valor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(60px, 15vw, 100px);
            font-weight: 900;
            color: gold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            z-index: 100;
            display: none;
        }

        .btn-dado-sel {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
            font-size: clamp(32px, 8vw, 40px);
            font-family: 'Cinzel', serif;
            font-weight: 900;
        }

        .btn-dado-sel:active {
            transform: scale(0.95);
        }

        .btn-dado-sel.tageado {
            background: #400;
            border: 2px solid #f00;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .grid-dados {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .btn-volver {
            width: 100%;
            padding: clamp(12px, 3vw, 15px);
            background: #333;
            border: 2px solid gold;
            color: gold;
            font-size: clamp(14px, 3vw, 16px);
            font-family: 'Cinzel', serif;
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-volver:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .contenedor-botones {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        @media (max-width: 480px) {
            .contenedor-dados {
                padding: 15px;
                gap: 12px;
            }

            .btn-dado-sel {
                padding: 12px;
                margin: 6px 0;
            }

            .dados-container {
                height: 200px;
            }

            .grid-dados {
                gap: 8px;
            }
        }

        @media (max-width: 360px) {
            .contenedor-dados {
                padding: 10px;
                gap: 10px;
            }

            .btn-dado-sel {
                padding: 10px;
                font-size: 28px;
            }

            .dados-container {
                height: 150px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="pantalla">
        <div class="contenedor-dados">
            <h1>ORACULO TESSERAE</h1>
            <p>CONSULTA EL DESTINO</p>

            <div class="datos-container">
                <div class="dados-container">
                    <video id="video-dados-solo" class="video-dados" src="https://kairosravina-bot.github.io/domusmagis/Dados.mp4" playsinline webkit-playsinline muted></video>
                    <div id="layer-valor-solo" class="layer-valor">0</div>
                </div>
            </div>

            <div class="contenedor-botones">
                <div class="btn-dado-sel" id="btn-solo-1" onclick="tirarDados(1)"><strong>1D</strong></div>

                <div class="grid-dados">
                    <div class="btn-dado-sel" id="btn-solo-2" onclick="tirarDados(2)"><strong>2D</strong></div>
                    <div class="btn-dado-sel" id="btn-solo-3" onclick="tirarDados(3)"><strong>3D</strong></div>
                    <div class="btn-dado-sel" id="btn-solo-4" onclick="tirarDados(4)"><strong>4D</strong></div>
                    <div class="btn-dado-sel" id="btn-solo-5" onclick="tirarDados(5)"><strong>5D</strong></div>
                </div>

                <button class="btn-volver" onclick="window.location.href='index.html'">⬅️ VOLVER</button>
            </div>
        </div>
    </div>

    <script>
        function tirarDados(n) {
            for (let i = 1; i <= 5; i++) {
                const btn = document.getElementById('btn-solo-' + i);
                if (btn) btn.classList.remove('tageado');
            }

            const btnSeleccionado = document.getElementById('btn-solo-' + n);
            if (btnSeleccionado) btnSeleccionado.classList.add('tageado');

            const vid = document.getElementById('video-dados-solo');
            const layer = document.getElementById('layer-valor-solo');

            layer.style.display = 'none';
            vid.currentTime = 0;
            vid.play().catch(e => console.log(e));

            vid.onended = () => {
                let total = 0;
                for (let i = 0; i < n; i++) total += Math.floor(Math.random() * 6) + 1;
                layer.innerText = total;
                layer.style.display = 'flex';
            };
        }
    </script>
</body>
</html>
