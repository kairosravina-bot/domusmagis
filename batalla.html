<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI: BATALLA V84</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1410 50%, #0a0a0a 100%);
        }

        .pantalla {
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            overflow-x: hidden;
            gap: 15px;
        }

        .oculto {
            display: none !important;
        }

        /* SETUP PLAYERS */
        #p-setup {
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            justify-content: center;
        }

        #p-setup h2 {
            color: white;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-size: clamp(24px, 6vw, 36px);
        }

        #setup-selector {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .btn-setup-elegant {
            width: 100%;
            max-width: 280px;
            padding: 20px;
            margin: 10px 0;
            font-family: 'Cinzel', serif;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 900;
            color: gold;
            background: linear-gradient(145deg, #2a2a2a, #000);
            border: 2px solid gold;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-setup-elegant:active {
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        }

        #registro {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            align-items: center;
        }

        #mago-nombre {
            width: 100%;
            max-width: 280px;
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid gold;
            border-radius: 8px;
            text-transform: uppercase;
            font-weight: 900;
            background: #1a1a1a;
            color: gold;
            font-family: 'Cinzel', serif;
        }

        .grid-casas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }

        .btn-casa {
            padding: 15px;
            border: 2px solid gold;
            border-radius: 8px;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 900;
            color: #d4af37;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cinzel', serif;
        }

        .btn-casa:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        /* UI JUEGO */
        #ui-juego {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            justify-content: space-between;
            padding: 10px;
            z-index: 100;
        }

        #zona-superior {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        #hud-derecho {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid gold;
            border-radius: 10px;
            align-items: center;
            position: absolute;
            top: 10px;
            right: 10px;
            max-width: 120px;
        }

        #hud-img-escudo {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        #hud-txt-arma {
            font-weight: 900;
            color: white;
            font-size: clamp(12px, 3vw, 16px);
            text-align: center;
        }

        #hud-txt-valor {
            font-weight: 900;
            font-size: clamp(36px, 10vw, 60px);
            color: gold;
        }

        #guia-scanner {
            width: 80%;
            max-width: 400px;
            aspect-ratio: 1;
            border: 3px solid #0f0;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.7);
            position: relative;
        }

        #guia-scanner.verde {
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
        }

        #video-action {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }

        /* ZONA INFERIOR */
        #zona-inferior {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            border: 2px solid gold;
        }

        .hud-horizontal {
            display: flex;
            width: 100%;
            gap: 5px;
            font-family: 'Cinzel', serif;
            margin-bottom: 10px;
        }

        #txt-turno {
            flex: 1;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px;
            border: 2px solid gold;
            font-size: clamp(12px, 3vw, 16px);
            font-weight: 900;
            border-radius: 5px;
            color: white;
        }

        #txt-vuelta {
            background: gold;
            color: black;
            padding: 8px 12px;
            font-size: clamp(12px, 3vw, 16px);
            font-weight: 900;
            border-radius: 5px;
            border: 2px solid gold;
            white-space: nowrap;
        }

        #msg-visor {
            font-size: clamp(20px, 5vw, 32px);
            color: gold;
            font-weight: 900;
            letter-spacing: 8px;
            text-align: center;
        }

        .contenedor-gemas {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            width: 100%;
        }

        .wrapper-gema {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-gema {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #8b6f47 0%, #5a4a2a 100%);
            border: 2px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-weight: 900;
            font-size: clamp(24px, 6vw, 36px);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cinzel', serif;
        }

        .btn-gema:active {
            transform: scale(0.9);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        .letra-grande {
            display: block;
            line-height: 1;
        }

        .valor-flotante {
            position: absolute;
            top: -20px;
            color: #0f0;
            font-weight: 900;
            font-size: clamp(12px, 3vw, 18px);
        }

        .valor-flotante.neon-blanco {
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        .valor-flotante.neon-violeta {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        #slot-indicator {
            color: gold;
            font-weight: 900;
        }

        .btn-master {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fff;
            background: linear-gradient(to bottom, #500, #200);
            color: gold;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 900;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
        }

        .btn-master:active {
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }

        .btn-maestro-contenedor {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-maestro-contenedor .btn-master {
            flex: 1;
        }

        /* MODAL DADOS */
        #modal-dados-fase {
            z-index: 9500;
            background: rgba(0, 0, 0, 0.98);
            padding: 20px;
        }

        #dados-player-name {
            font-size: clamp(28px, 7vw, 36px);
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }

        .dados-container {
            width: 100%;
            max-width: 400px;
            height: 300px;
            position: relative;
            margin: 20px 0;
            border: 2px solid gold;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.8);
        }

        .video-dados {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .layer-valor {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(60px, 15vw, 120px);
            font-weight: 900;
            color: gold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            z-index: 100;
        }

        .btn-dado-sel {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #222;
            border: 2px solid #444;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: clamp(40px, 12vw, 60px);
            cursor: pointer;
            text-shadow: 2px 2px 4px #000;
            transition: all 0.2s;
            font-family: 'Cinzel', serif;
            font-weight: 900;
        }

        .btn-dado-sel.tageado {
            background: #400 !important;
            border: 3px solid #f00 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5) !important;
        }

        .grid-dados {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        /* PANTALLA RESULTADOS */
        #p-resultado {
            z-index: 11000;
            background: rgba(0, 0, 0, 0.95);
            justify-content: flex-start;
            padding-top: 30px;
        }

        #resultado-batalla {
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        #resultado-batalla h2 {
            text-align: center;
            color: gold;
            font-size: clamp(28px, 6vw, 36px);
            margin-bottom: 30px;
            font-weight: 900;
        }

        .resultado-jugador {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 3px solid;
            border-radius: 8px;
        }

        .resultado-jugador > div:first-child {
            font-size: clamp(20px, 5vw, 30px);
            font-weight: 900;
            margin-bottom: 5px;
        }

        .resultado-jugador > div:nth-child(2) {
            color: #000;
            font-weight: 900;
            font-size: clamp(16px, 4vw, 20px);
        }

        .papiro-ronda {
            display: flex;
            width: 45px;
            height: 50px;
            background: linear-gradient(135deg, #f5deb3 0%, #ffe8b6 100%);
            border: 2px solid #8b7355;
            border-radius: 5px;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: #000;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            margin-right: 5px;
            flex-shrink: 0;
        }

        /* PANTALLA VICTORIA */
        #p-victoria {
            z-index: 12000;
            background: rgba(0, 0, 0, 0.98);
            justify-content: center;
        }

        .papiro-final {
            width: 100%;
            max-width: 500px;
            background: url('BG_PERGAMINO.jpg') no-repeat center center;
            background-size: cover;
            padding: 60px 20px;
            border: 8px double #5a3a22;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        #vic-titulo {
            color: #b8860b;
            font-size: clamp(32px, 8vw, 50px);
            font-weight: 900;
            margin-bottom: 10px;
        }

        #vic-nombre {
            font-size: clamp(40px, 10vw, 60px);
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .pantalla {
                padding: 10px;
                gap: 8px;
            }

            #zona-inferior {
                padding: 10px;
                gap: 8px;
            }

            .contenedor-gemas {
                gap: 6px;
            }

            .grid-dados {
                gap: 8px;
            }

            #resultado-batalla {
                max-height: 65vh;
                padding: 10px;
            }

            .papiro-final {
                padding: 40px 15px;
            }
        }

        @media (max-width: 360px) {
            .pantalla {
                padding: 8px;
            }

            #zona-inferior {
                padding: 8px;
                gap: 6px;
            }

            .contenedor-gemas {
                gap: 5px;
            }

            .btn-gema {
                font-size: 24px;
            }

            .resultado-jugador {
                padding: 10px;
            }
        }

        /* Safe area para notch */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Audio de Fanfarrea -->
    <audio id="audio-fanfarria" src="fanfarrea.mp3" preload="auto"></audio>

    <div id="container-ar"></div>

    <!-- MODAL DADOS -->
    <div id="modal-dados-fase" class="pantalla oculto">
        <h1 id="dados-player-name">JUGADOR</h1>
        <div class="dados-container">
            <video id="video-dados-batalla" class="video-dados" src="https://kairosravina-bot.github.io/domusmagis/Dados.mp4" playsinline muted></video>
            <div id="layer-valor-batalla" class="layer-valor"></div>
        </div>

        <div style="width: 100%; max-width: 300px; margin: 15px auto;">
            <div id="btn-batalla-1" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(1)"><strong>1</strong></div>
        </div>

        <div class="grid-dados">
            <div id="btn-batalla-2" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(2)"><strong>2</strong></div>
            <div id="btn-batalla-3" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(3)"><strong>3</strong></div>
            <div id="btn-batalla-4" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(4)"><strong>4</strong></div>
            <div id="btn-batalla-5" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(5)"><strong>5</strong></div>
        </div>
    </div>

    <!-- PLAYERS SETUP -->
    <div id="p-setup" class="pantalla">
        <h2>PLAYERS</h2>
        <div id="setup-selector">
            <button class="btn-setup-elegant" onclick="window.setModo(2)">2 PLAYERS</button>
            <button class="btn-setup-elegant" onclick="window.setModo(4)">4 PLAYERS</button>
        </div>
        <div id="registro" class="oculto">
            <input type="text" id="mago-nombre" placeholder="NOMBRE DEL MAGO" maxlength="10">
            <div class="grid-casas">
                <button onclick="window.registrarMago('TERRA','#ff0000')" class="btn-casa" style="background:#500;">🛡️ TERRA</button>
                <button onclick="window.registrarMago('CAELUM','#00aaff')" class="btn-casa" style="background:#003;">⚔️ CAELUM</button>
                <button onclick="window.registrarMago('AQUA','#00ff88')" class="btn-casa" style="background:#030;">💧 AQUA</button>
                <button onclick="window.registrarMago('DIMENSIO','#aa00ff')" class="btn-casa" style="background:#303;">✨ DIMENSIO</button>
            </div>
        </div>
    </div>

    <!-- UI JUEGO -->
    <div id="ui-juego" class="oculto">
        <div id="zona-superior">
            <div id="hud-derecho">
                <img id="hud-img-escudo" src="" alt="Escudo">
                <div id="hud-txt-arma">ARMA</div>
                <div id="hud-txt-valor">00</div>
            </div>
            <div id="guia-scanner"></div>
            <video id="video-action" playsinline style="display:none;"></video>
        </div>

        <div id="zona-inferior">
            <div class="hud-horizontal">
                <div id="txt-turno">TURNO: ---</div>
                <div id="txt-vuelta">ROUND: 1 / 7</div>
            </div>

            <div id="msg-visor">SCAN</div>

            <p style="color:#aaa; font-weight:900; text-align:center; margin:5px 0;">SLOT: <span id="slot-indicator">1/3</span></p>

            <div class="contenedor-gemas">
                <div class="wrapper-gema"><span id="val-i" class="valor-flotante"></span><button id="btn-i" class="btn-gema"><span class="letra-grande">I</span></button></div>
                <div class="wrapper-gema"><span id="val-a" class="valor-flotante"></span><button id="btn-a" class="btn-gema"><span class="letra-grande">A</span></button></div>
                <div class="wrapper-gema"><span id="val-t" class="valor-flotante"></span><button id="btn-t" class="btn-gema"><span class="letra-grande">T</span></button></div>
                <div class="wrapper-gema"><span id="val-m" class="valor-flotante"></span><button id="btn-m" class="btn-gema"><span class="letra-grande">M</span></button></div>
            </div>

            <div class="btn-maestro-contenedor">
                <button id="btn-confirmar" class="btn-master" style="background:#050;">OK</button>
                <button id="btn-forzar" class="btn-master" style="background:#500; font-size:24px;" onclick="window.iniciarFaseDados()">🎲</button>
                <button id="btn-reescaneo" class="btn-master" style="background:#aa8800; font-size:24px;" onclick="window.forzarReescaneo()">👁️</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA RESULTADOS -->
    <div id="p-resultado" class="pantalla oculto">
        <div id="resultado-batalla">
            <h2>⚔️ RESULTADOS ⚔️</h2>
            <div id="resultado-contenido"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:350px; margin-top:10px;">
            <button id="btn-repetir-accion" class="btn-master" onclick="window.continuarContienda()">⚔️ SIGUIENTE RONDA</button>
            <button class="btn-master" style="background:#500; border-color:#fff;" onclick="window.location.href='index.html';">EXIT</button>
        </div>
    </div>

    <!-- PANTALLA VICTORIA FINAL -->
    <div id="p-victoria" class="pantalla oculto">
        <div class="papiro-final">
            <h1 id="vic-titulo">THE WINNER IS</h1>
            <div id="vic-nombre">NOMBRE</div>
            <button class="btn-master" style="background:#500; border-color:#fff; color: white; width: 100%; max-width: 200px;" onclick="window.location.href='index.html';">EXIT</button>
        </div>
    </div>

    <script type="module">
        import { iniciarOjo, resetUltimoId, RUTA_BASE, VIDEOS_BATALLA } from './ojo.js';

        let jugadores = [], cantJugadores = 0, turnoIdx = 0, slotActual = 0, vueltaActual = 1;
        let cartaActual = null, jugadaPendiente = null, diceIdx = 0;
        const MAX_SLOTS = 3, MAX_VUELTAS = 7;

        function prepararAudio() {
            const fmf = document.getElementById('audio-fanfarria');
            fmf.muted = true;
            fmf.play().then(() => {
                fmf.pause();
                fmf.muted = false;
                fmf.currentTime = 0;
            }).catch(e => console.log("Audio prep waiting..."));
        }

        window.setModo = (m) => {
            prepararAudio();
            cantJugadores = m;
            document.getElementById('setup-selector').style.display = 'none';
            document.getElementById('registro').classList.remove('oculto');
        };

        window.registrarMago = (elem, col) => {
            const nom = document.getElementById('mago-nombre').value.trim().toUpperCase();
            if (!nom) return alert("Nombre vacío");
            jugadores.push({ nombre: nom, elemento: elem, color: col, slotsPuntos: 0, dadoRonda: 0, puntosTotales: 0, historico: [] });
            document.getElementById('mago-nombre').value = "";
            if (jugadores.length === cantJugadores) {
                document.getElementById('p-setup').classList.add('oculto');
                document.getElementById('ui-juego').classList.remove('oculto');
                iniciarPartida();
            }
        };

        function iniciarPartida() {
            actualizarUI();
            iniciarOjo('container-ar', (carta) => {
                cartaActual = carta;
                document.getElementById('guia-scanner').className = "verde";
                setTimeout(() => document.getElementById('guia-scanner').className = "", 600);
                document.getElementById('msg-visor').innerHTML = `<span style="letter-spacing:1px;">${carta.nombre}</span>`;
                ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
                    const v = document.getElementById(id.replace('btn-', 'val-'));
                    if (v) {
                        v.innerText = carta.botones[id].valor;
                        v.className = "valor-flotante " + (carta.tipo === 'CASA' ? 'neon-blanco' : 'neon-violeta');
                    }
                });
            });
        }

        function actualizarUI() {
            const j = jugadores[turnoIdx];
            document.getElementById('txt-turno').innerText = `TURNO: ${j.nombre}`;
            document.getElementById('txt-turno').style.color = j.color;
            document.getElementById('slot-indicator').innerText = `${slotActual + 1}/${MAX_SLOTS}`;
            document.getElementById('txt-vuelta').innerText = `ROUND: ${vueltaActual} / ${MAX_VUELTAS}`;
        }

        window.forzarReescaneo = () => {
            cartaActual = null;
            resetUltimoId();
            document.getElementById('msg-visor').innerText = "SCAN";
            ['val-i', 'val-a', 'val-t', 'val-m'].forEach(v => {
                const el = document.getElementById(v);
                if (el) el.innerText = "";
            });
        };

        ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
            const btn = document.getElementById(id);
            if (btn) {
                btn.onclick = () => {
                    if (!cartaActual) return;
                    const conf = cartaActual.botones[id];
                    jugadaPendiente = { val: conf.valor };
                    const v = document.getElementById('video-action');
                    v.style.display = 'block';
                    v.src = RUTA_BASE + conf.video;
                    v.play();
                    document.getElementById('hud-derecho').style.display = 'flex';
                    document.getElementById('hud-img-escudo').src = RUTA_BASE + cartaActual.imgEscudo;
                    document.getElementById('hud-txt-arma').innerText = cartaActual.nombre;
                    document.getElementById('hud-txt-valor').innerText = conf.valor;
                    v.onended = () => {
                        v.style.display = 'none';
                        document.getElementById('hud-derecho').style.display = 'none';
                    };
                };
            }
        });

        document.getElementById('btn-confirmar').onclick = () => {
            if (!jugadaPendiente) return alert("Selecciona gema");
            jugadores[turnoIdx].slotsPuntos += jugadaPendiente.val;
            jugadaPendiente = null;
            turnoIdx++;
            if (turnoIdx >= cantJugadores) {
                turnoIdx = 0;
                slotActual++;
                if (slotActual >= MAX_SLOTS) {
                    window.iniciarFaseDados();
                    return;
                }
            }
            actualizarUI();
            window.forzarReescaneo();
        };

        window.iniciarFaseDados = () => {
            document.getElementById('ui-juego').classList.add('oculto');
            document.getElementById('modal-dados-fase').classList.remove('oculto');
            document.getElementById('layer-valor-batalla').innerText = "";
            document.getElementById('dados-player-name').innerText = jugadores[diceIdx].nombre;
            document.getElementById('dados-player-name').style.color = jugadores[diceIdx].color;
            for (let i = 1; i <= 5; i++) {
                const b = document.getElementById('btn-batalla-' + i);
                if (b) b.classList.remove('tageado');
            }
        };

        window.ejecutarLanzamientoBatalla = (n) => {
            for (let i = 1; i <= 5; i++) {
                const b = document.getElementById('btn-batalla-' + i);
                if (b) b.classList.remove('tageado');
            }
            document.getElementById('btn-batalla-' + n).classList.add('tageado');

            const vid = document.getElementById('video-dados-batalla');
            const res = document.getElementById('layer-valor-batalla');
            res.innerText = "";
            vid.play();
            vid.onended = () => {
                let suma = 0;
                for (let i = 0; i < n; i++) suma += Math.floor(Math.random() * 6) + 1;
                res.innerText = suma;
                jugadores[diceIdx].dadoRonda = suma;
                setTimeout(() => {
                    diceIdx++;
                    if (diceIdx < cantJugadores) {
                        window.iniciarFaseDados();
                    } else {
                        document.getElementById('modal-dados-fase').classList.add('oculto');
                        mostrarResultados();
                    }
                }, 3000);
            };
        };

        function mostrarResultados() {
            const cont = document.getElementById('resultado-contenido');
            cont.innerHTML = "";
            jugadores.forEach(j => {
                const totalRonda = j.slotsPuntos + j.dadoRonda;
                j.puntosTotales += totalRonda;
                j.historico.push(totalRonda);
                let papiros = j.historico.map(h => `<div class="papiro-ronda">${h}</div>`).join('');
                cont.innerHTML += `<div class="resultado-jugador" style="border-color: ${j.color};">
                    <div style="color:${j.color};">${j.nombre}</div>
                    <div>TOTAL: ${j.puntosTotales}</div>
                    <div style="display:flex; flex-direction:row; overflow-x:auto; padding:10px 0;">${papiros}</div>
                </div>`;
            });

            document.getElementById('p-resultado').classList.remove('oculto');

            if (vueltaActual >= MAX_VUELTAS) {
                document.getElementById('btn-repetir-accion').style.display = 'none';
                setTimeout(() => {
                    document.getElementById('p-resultado').classList.add('oculto');
                    const pVic = document.getElementById('p-victoria');
                    const txtVicNombre = document.getElementById('vic-nombre');
                    const txtVicTitulo = document.getElementById('vic-titulo');
                    const fmf = document.getElementById('audio-fanfarria');

                    pVic.classList.remove('oculto');
                    if (fmf) fmf.play();

                    let copia = [...jugadores].sort((a, b) => b.puntosTotales - a.puntosTotales);
                    if (copia.length > 1 && copia[0].puntosTotales === copia[1].puntosTotales) {
                        txtVicTitulo.innerText = "TIE GAME";
                        txtVicNombre.innerText = "NO WINNER";
                        txtVicNombre.style.color = "gold";
                    } else {
                        txtVicTitulo.innerText = "THE WINNER IS";
                        txtVicNombre.innerText = copia[0].nombre;
                        txtVicNombre.style.color = copia[0].color;
                    }
                }, 3000);
            }
        }

        window.continuarContienda = () => {
            vueltaActual++;
            slotActual = 0;
            turnoIdx = 0;
            diceIdx = 0;
            jugadores.forEach(j => {
                j.slotsPuntos = 0;
                j.dadoRonda = 0;
            });
            document.getElementById('p-resultado').classList.add('oculto');
            document.getElementById('ui-juego').classList.remove('oculto');
            window.forzarReescaneo();
            actualizarUI();
        };
    </script>
</body>
</html>
