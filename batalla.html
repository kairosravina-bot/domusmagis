<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI: BATALLA V85</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        .papiro-ronda { display: flex; width: 45px; height: 50px; background: linear-gradient(135deg, #f5deb3 0%, #ffe8b6 100%); border: 2px solid #8b7355; border-radius: 5px; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .btn-dado-sel { width: 100%; height: 80px; border: 3px solid #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 40px !important; cursor: pointer; text-shadow: 2px 2px 4px #000; }
        .btn-setup-elegant { font-family: var(--font-titulo); font-weight: 900; font-size: 24px; color: gold; background: linear-gradient(145deg, #300, #100); border: 2px solid gold; border-radius: 15px; padding: 25px; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="container-ar"></div>
    
    <div id="ui-superior-fijo" style="position:fixed; top:10px; left:10px; z-index:9000; display:none;">
        <div id="txt-turno" style="background:rgba(0,0,0,0.9); padding:10px 15px; border:3px solid gold; font-size:24px; font-weight:900; border-radius:8px;">TURNO: ---</div>
        <div id="txt-vuelta" style="background:gold; color:black; padding:5px 10px; font-weight:900; border-radius:5px; margin-top:5px; display:inline-block;">ROUND: 1 / 7</div>
    </div>

    <!-- MODAL DADOS -->
    <div id="modal-dados-fase" class="pantalla oculto" style="z-index:9500; background:rgba(0,0,0,0.95);">
        <h1 id="dados-player-name" style="font-size:36px; font-weight:900; color:white;">JUGADOR</h1>
        <div class="dados-container">
            <video id="video-dados-batalla" class="video-dados" src="https://kairosravina-bot.github.io/domusmagis/Dados.mp4" playsinline muted></video>
            <div id="layer-valor-batalla" class="layer-valor" style="font-weight:900;"></div>
        </div>
        <div style="width:100%; max-width:300px;">
            <div class="btn-dado-sel" style="background: #DDA0DD; color: #000; margin-bottom:10px;" onclick="window.ejecutarLanzamientoBatalla(1)"><strong>1</strong></div>
            <div class="grid-dados" style="margin-top:0;">
                <div class="btn-dado-sel" style="background: #a00;" onclick="window.ejecutarLanzamientoBatalla(2)"><strong>2</strong></div>
                <div class="btn-dado-sel" style="background: #00a;" onclick="window.ejecutarLanzamientoBatalla(3)"><strong>3</strong></div>
                <div class="btn-dado-sel" style="background: #0a0;" onclick="window.ejecutarLanzamientoBatalla(4)"><strong>4</strong></div>
                <div class="btn-dado-sel" style="background: #a0a;" onclick="window.ejecutarLanzamientoBatalla(5)"><strong>5</strong></div>
            </div>
        </div>
    </div>

    <!-- SETUP PLAYERS VERTICAL -->
    <div id="p-setup" class="pantalla" style="background:rgba(0,0,0,0.8); z-index:10000;">
        <h2 style="color:gold; letter-spacing:5px;">PLAYERS SETUP</h2>
        <div id="setup-selector" style="display:flex; flex-direction:column; gap:20px; width:100%; max-width:300px;">
            <button class="btn-setup-elegant" onclick="window.setModo(2)">2 PLAYERS</button>
            <button class="btn-setup-elegant" onclick="window.setModo(4)">4 PLAYERS</button>
        </div>
        <div id="registro" class="oculto" style="width:100%; max-width:350px;">
            <input type="text" id="mago-nombre" placeholder="NOMBRE DEL MAGO">
            <div class="grid-casas">
                <button onclick="window.registrarMago('TERRA','#ff0000')" class="btn-casa" style="background:#500;">🛡️ TERRA</button>
                <button onclick="window.registrarMago('CAELUM','#00aaff')" class="btn-casa" style="background:#003;">⚔️ CAELUM</button>
                <button onclick="window.registrarMago('AQUA','#00ff88')" class="btn-casa" style="background:#030;">💧 AQUA</button>
                <button onclick="window.registrarMago('DIMENSIO','#aa00ff')" class="btn-casa" style="background:#303;">✨ DIMENSIO</button>
            </div>
        </div>
    </div>

    <!-- UI JUEGO -->
    <div id="ui-juego" class="oculto">
        <div id="zona-superior">
            <div id="hud-derecho">
                <img id="hud-img-escudo" src="">
                <div id="hud-txt-arma" style="font-weight:900; color:white;">ARMA</div>
                <div id="hud-txt-valor" style="font-weight:900; font-size:60px; color:gold;">00</div>
            </div>
            <div id="guia-scanner"></div>
            <video id="video-action" playsinline style="display:none;"></video>
        </div>
        <div id="zona-inferior">
            <div id="msg-visor" style="font-size:32px; color:gold; font-weight:900; letter-spacing:2px;">SOLO SCAN</div>
            <p style="color:#aaa; font-weight:900;">SLOT: <span id="slot-indicator">1/3</span></p>
            <div class="contenedor-gemas">
                <div class="wrapper-gema"><span id="val-i" class="valor-flotante"></span><button id="btn-i" class="btn-gema"><span class="letra-grande">I</span></button></div>
                <div class="wrapper-gema"><span id="val-a" class="valor-flotante"></span><button id="btn-a" class="btn-gema"><span class="letra-grande">A</span></button></div>
                <div class="wrapper-gema"><span id="val-t" class="valor-flotante"></span><button id="btn-t" class="btn-gema"><span class="letra-grande">T</span></button></div>
                <div class="wrapper-gema"><span id="val-m" class="valor-flotante"></span><button id="btn-m" class="btn-gema"><span class="letra-grande">M</span></button></div>
            </div>
            <div style="display:flex; gap:10px; width:100%;">
                <button id="btn-confirmar" class="btn-master" style="background:#050; flex:1;">OK</button>
                <button id="btn-forzar" class="btn-master" style="background:#500; flex:1; font-size:24px;" onclick="window.iniciarFaseDados()">🎲</button>
                <button id="btn-reescaneo" class="btn-master" style="background:#aa8800; flex:1; font-size:24px;" onclick="window.forzarReescaneo()">👁️</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA RESULTADOS / WINNER -->
    <div id="p-resultado" class="pantalla oculto" style="z-index:11000; background:rgba(0,0,0,0.95);">
        <div id="resultado-batalla" style="max-height:85vh; width:100%; overflow-y:auto; padding:20px;">
            <div id="resultado-contenido"></div>
            
            <div id="box-winner" style="display:none; text-align:center; margin-top:30px; padding:30px; border:5px double gold; border-radius:20px; background:rgba(255,215,0,0.1);">
                <div style="font-size:60px; font-weight:900; color:gold; text-shadow:0 0 20px gold;">WINNER</div>
                <div id="txt-ganador-nombre" style="font-size:50px; font-weight:900; margin:20px 0;"></div>
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <button class="btn-master" style="background:gold; color:black;" onclick="location.href='index.html'">VOLVER AL INICIO</button>
                    <button class="btn-master" style="background:#444;" onclick="window.close()">SALIR</button>
                </div>
            </div>
        </div>
        <button id="btn-siguiente-ronda" class="btn-master" onclick="window.continuarContienda()">⚔️ SIGUIENTE RONDA</button>
    </div>

    <script type="module">
        import { iniciarOjo, resetUltimoId, RUTA_BASE } from './ojo.js';

        let jugadores = [], cantJugadores = 0, turnoIdx = 0, slotActual = 0, vueltaActual = 1;
        let cartaActual = null, jugadaPendiente = null, diceIdx = 0;
        const MAX_SLOTS = 3, MAX_VUELTAS = 7;

        window.setModo = (m) => { 
            cantJugadores = m; 
            document.getElementById('setup-selector').style.display='none'; 
            document.getElementById('registro').classList.remove('oculto'); 
        };

        window.registrarMago = (elem, col) => {
            const nom = document.getElementById('mago-nombre').value.trim().toUpperCase();
            if(!nom) return alert("Nombre vacío");
            jugadores.push({ nombre: nom, elemento: elem, color: col, slotsPuntos: 0, dadoRonda: 0, puntosTotales: 0, historico: [] });
            document.getElementById('mago-nombre').value = "";
            if(jugadores.length === cantJugadores) { 
                document.getElementById('p-setup').classList.add('oculto'); 
                document.getElementById('ui-juego').classList.remove('oculto'); 
                document.getElementById('ui-superior-fijo').style.display = 'block'; 
                iniciarPartida(); 
            }
        };

        function iniciarPartida() {
            actualizarUI();
            iniciarOjo('container-ar', (carta) => {
                cartaActual = carta;
                document.getElementById('msg-visor').innerHTML = `<span>${carta.nombre}</span>`;
                ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
                    document.getElementById(id.replace('btn-', 'val-')).innerText = carta.botones[id].valor;
                });
            });
        }

        function actualizarUI() {
            const j = jugadores[turnoIdx];
            document.getElementById('txt-turno').innerText = `TURNO: ${j.nombre}`;
            document.getElementById('txt-turno').style.color = j.color;
            document.getElementById('slot-indicator').innerText = `${slotActual + 1}/${MAX_SLOTS}`;
            document.getElementById('txt-vuelta').innerText = `ROUND: ${vueltaActual} / ${MAX_VUELTAS}`;
        }

        window.forzarReescaneo = () => { 
            cartaActual = null; resetUltimoId(); document.getElementById('msg-visor').innerText = "SOLO SCAN"; 
            ['val-i', 'val-a', 'val-t', 'val-m'].forEach(v => document.getElementById(v).innerText = ""); 
        };

        ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
            document.getElementById(id).onclick = () => {
                if(!cartaActual) return;
                const conf = cartaActual.botones[id];
                jugadaPendiente = { val: conf.valor };
                const v = document.getElementById('video-action'); 
                v.style.display = 'block'; v.src = RUTA_BASE + conf.video; v.play();
                v.onended = () => v.style.display = 'none';
            };
        });

        document.getElementById('btn-confirmar').onclick = () => {
            if(!jugadaPendiente) return alert("Selecciona gema");
            jugadores[turnoIdx].slotsPuntos += jugadaPendiente.val;
            jugadaPendiente = null; turnoIdx++;
            if(turnoIdx >= cantJugadores) { turnoIdx = 0; slotActual++; if(slotActual >= MAX_SLOTS) { window.iniciarFaseDados(); return; } }
            actualizarUI(); window.forzarReescaneo();
        };

        window.iniciarFaseDados = () => {
            document.getElementById('ui-juego').classList.add('oculto');
            document.getElementById('modal-dados-fase').classList.remove('oculto');
            document.getElementById('dados-player-name').innerText = jugadores[diceIdx].nombre;
            document.getElementById('dados-player-name').style.color = jugadores[diceIdx].color;
        };

        window.ejecutarLanzamientoBatalla = (n) => {
            const vid = document.getElementById('video-dados-batalla');
            vid.play();
            vid.onended = () => {
                let suma = 0; for(let i=0; i<n; i++) suma += Math.floor(Math.random()*6)+1;
                document.getElementById('layer-valor-batalla').innerText = suma;
                jugadores[diceIdx].dadoRonda = suma;
                setTimeout(() => {
                    diceIdx++; document.getElementById('layer-valor-batalla').innerText = "";
                    if(diceIdx < cantJugadores) { window.iniciarFaseDados(); } 
                    else { document.getElementById('modal-dados-fase').classList.add('oculto'); mostrarResultados(); }
                }, 2000);
            };
        };

        function mostrarResultados() {
            const cont = document.getElementById('resultado-contenido');
            cont.innerHTML = "";
            jugadores.forEach(j => {
                const totalRonda = j.slotsPuntos + j.dadoRonda;
                j.puntosTotales += totalRonda; j.historico.push(totalRonda);
                cont.innerHTML += `<div class="resultado-jugador" style="border-bottom:3px solid ${j.color}; padding:10px; color:black; background:rgba(255,255,255,0.8); margin-bottom:10px;">
                    <div style="font-weight:900; font-size:24px;">${j.nombre}</div>
                    <div>RONDA: ${totalRonda} (C: ${j.slotsPuntos} + D: ${j.dadoRonda})</div>
                    <div style="font-weight:900;">TOTAL ACUMULADO: ${j.puntosTotales}</div>
                </div>`;
            });

            if(vueltaActual >= MAX_VUELTAS) {
                document.getElementById('btn-siguiente-ronda').style.display = 'none';
                const ganador = jugadores.reduce((a, b) => a.puntosTotales > b.puntosTotales ? a : b);
                document.getElementById('box-winner').style.display = 'block';
                document.getElementById('txt-ganador-nombre').innerText = ganador.nombre;
                document.getElementById('txt-ganador-nombre').style.color = ganador.color;
            }
            document.getElementById('p-resultado').classList.remove('oculto');
        }

        window.continuarContienda = () => {
            vueltaActual++; slotActual = 0; turnoIdx = 0; diceIdx = 0;
            jugadores.forEach(j => { j.slotsPuntos = 0; j.dadoRonda = 0; });
            document.getElementById('p-resultado').classList.add('oculto');
            document.getElementById('ui-juego').classList.remove('oculto');
            window.forzarReescaneo(); actualizarUI();
        };
    </script>
</body>
</html>
