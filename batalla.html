<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI: BATALLA V84</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        .papiro-ronda {
            display: flex;
            width: 45px;
            height: 50px;
            background: linear-gradient(135deg, #f5deb3 0%, #ffe8b6 100%);
            border: 2px solid #8b7355;
            border-radius: 5px;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            color: #000;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* Botones de dados estilo Oráculo */
        .btn-dado-sel {
            width: 100%; height: 90px;
            background: #222; border: 1px solid #444; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #666; font-size: 60px !important; cursor: pointer;
            text-shadow: 2px 2px 4px #000;
            transition: all 0.2s;
            font-family: 'Cinzel', serif;
        }
        .btn-dado-sel.tageado { 
            background: #400; border: 3px solid #f00; color: #fff; 
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }

        /* Estilo elegante para botones de setup vertical */
        .btn-setup-elegant {
            width: 280px;
            padding: 20px;
            margin: 10px 0;
            font-family: 'Cinzel', serif;
            font-size: 22px;
            font-weight: 900;
            color: gold;
            background: linear-gradient(145deg, #2a2a2a, #000);
            border: 2px solid gold;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-setup-elegant:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px gold;
        }

        /* HUD horizontal para Turno y Round */
        .hud-horizontal {
            display: flex;
            width: 100%;
            gap: 5px;
            padding: 0 5px;
            font-family: 'Cinzel', serif;
            margin-bottom: 10px;
        }
        #txt-turno {
            flex: 1;
            background: rgba(0,0,0,0.9);
            padding: 8px;
            border: 2px solid gold;
            font-size: 16px;
            font-weight: 900;
            border-radius: 5px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #txt-vuelta {
            background: gold;
            color: black;
            padding: 8px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 5px;
            text-align: center;
            border: 2px solid gold;
            min-width: fit-content;
        }
    </style>
</head>
<body>
    <div id="container-ar"></div>

    <!-- MODAL DADOS -->
    <div id="modal-dados-fase" class="pantalla oculto" style="z-index:9500; background:rgba(0,0,0,0.95);">
        <h1 id="dados-player-name" style="font-size:36px; font-weight:900; color:white;">JUGADOR</h1>
        <div class="dados-container">
            <video id="video-dados-batalla" class="video-dados" src="https://kairosravina-bot.github.io/domusmagis/Dados.mp4" playsinline muted></video>
            <div id="layer-valor-batalla" class="layer-valor" style="font-weight:900;"></div>
        </div>
        <div style="width: 100%; max-width: 300px; margin-bottom: 15px;">
            <div id="btn-batalla-1" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(1)"><strong>1</strong></div>
        </div>
        <div class="grid-dados">
            <div id="btn-batalla-2" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(2)"><strong>2</strong></div>
            <div id="btn-batalla-3" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(3)"><strong>3</strong></div>
            <div id="btn-batalla-4" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(4)"><strong>4</strong></div>
            <div id="btn-batalla-5" class="btn-dado-sel" onclick="window.ejecutarLanzamientoBatalla(5)"><strong>5</strong></div>
        </div>
    </div>

    <!-- PLAYERS SETUP -->
    <div id="p-setup" class="pantalla" style="background:rgba(0,0,0,0.85); z-index:10000;">
        <h2 style="color:white; letter-spacing: 5px; margin-bottom: 30px;">PLAYERS</h2>
        <div id="setup-selector" style="display:flex; flex-direction: column; gap:15px; align-items:center;">
            <button class="btn-setup-elegant" onclick="window.setModo(2)">2 PLAYERS</button>
            <button class="btn-setup-elegant" onclick="window.setModo(4)">4 PLAYERS</button>
        </div>
        <div id="registro" class="oculto">
            <input type="text" id="mago-nombre" placeholder="NOMBRE DEL MAGO" maxlength="10">
            <div class="grid-casas">
                <button onclick="window.registrarMago('TERRA','#ff0000')" class="btn-casa" style="background:#500;">🛡️ TERRA</button>
                <button onclick="window.registrarMago('CAELUM','#00aaff')" class="btn-casa" style="background:#003;">⚔️ CAELUM</button>
                <button onclick="window.registrarMago('AQUA','#00ff88')" class="btn-casa" style="background:#030;">💧 AQUA</button>
                <button onclick="window.registrarMago('DIMENSIO','#aa00ff')" class="btn-casa" style="background:#303;">✨ DIMENSIO</button>
            </div>
        </div>
    </div>

    <!-- UI JUEGO -->
    <div id="ui-juego" class="oculto">
        <div id="zona-superior">
            <div id="hud-derecho">
                <img id="hud-img-escudo" src="">
                <div id="hud-txt-arma" style="font-weight:900; color:white;">ARMA</div>
                <div id="hud-txt-valor" style="font-weight:900; font-size:60px; color:gold;">00</div>
            </div>
            <div id="guia-scanner"></div>
            <video id="video-action" playsinline style="display:none;"></video>
        </div>
        <div id="zona-inferior">
            <div class="hud-horizontal">
                <div id="txt-turno">TURNO: ---</div>
                <div id="txt-vuelta">ROUND: 1 / 7</div>
            </div>

            <div id="msg-visor" style="font-size:32px; color:gold; font-weight:900; letter-spacing:8px;">SCAN</div>
            <p style="color:#aaa; font-weight:900;">SLOT: <span id="slot-indicator">1/3</span></p>
            <div class="contenedor-gemas">
                <div class="wrapper-gema"><span id="val-i" class="valor-flotante"></span><button id="btn-i" class="btn-gema"><span class="letra-grande">I</span></button></div>
                <div class="wrapper-gema"><span id="val-a" class="valor-flotante"></span><button id="btn-a" class="btn-gema"><span class="letra-grande">A</span></button></div>
                <div class="wrapper-gema"><span id="val-t" class="valor-flotante"></span><button id="btn-t" class="btn-gema"><span class="letra-grande">T</span></button></div>
                <div class="wrapper-gema"><span id="val-m" class="valor-flotante"></span><button id="btn-m" class="btn-gema"><span class="letra-grande">M</span></button></div>
            </div>
            <div style="display:flex; gap:10px; width:100%;">
                <button id="btn-confirmar" class="btn-master" style="background:#050; flex:1;">OK</button>
                <button id="btn-forzar" class="btn-master" style="background:#500; flex:1; font-size:24px;" onclick="window.iniciarFaseDados()">🎲</button>
                <button id="btn-reescaneo" class="btn-master" style="background:#aa8800; flex:1; font-size:24px;" onclick="window.forzarReescaneo()">👁️</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA RESULTADOS -->
    <div id="p-resultado" class="pantalla oculto" style="z-index:11000; background:rgba(0,0,0,0.9);">
        <div id="resultado-batalla" style="max-height:85vh; overflow-y:auto; padding:20px;">
            <h2 style="text-align:center; color:#000; font-size:32px; margin-bottom:30px; font-weight:900;">⚔️ RESULTADOS ⚔️</h2>
            <div id="resultado-contenido"></div>
            <div id="resultado-ganador" style="display:none; text-align:center; margin-top:40px; padding:30px; background:rgba(0,0,0,0.1); border:3px solid #000; border-radius:10px;">
                <div style="font-size:48px; font-weight:900; color:#000; margin-bottom:20px;">👑 GANADOR 👑</div>
                <div id="txt-ganador-final" style="font-size:42px; font-weight:900;"></div>
            </div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:350px; margin-top:10px;">
            <button id="btn-repetir-accion" class="btn-master" onclick="window.continuarContienda()">⚔️ SIGUIENTE RONDA</button>
            <!-- Botón EXIT con método de cierre forzado -->
            <button class="btn-master" style="background:#500; border-color:#fff;" onclick="window.open('', '_self').close();">EXIT</button>
        </div>
    </div>

    <script type="module">
        import { iniciarOjo, resetUltimoId, RUTA_BASE, VIDEOS_BATALLA } from './ojo.js';

        let jugadores = [], cantJugadores = 0, turnoIdx = 0, slotActual = 0, vueltaActual = 1;
        let cartaActual = null, jugadaPendiente = null, diceIdx = 0;
        const MAX_SLOTS = 3, MAX_VUELTAS = 7;

        window.setModo = (m) => { 
            cantJugadores = m; 
            document.getElementById('setup-selector').style.display='none'; 
            document.getElementById('registro').classList.remove('oculto'); 
        };

        window.registrarMago = (elem, col) => {
            const nom = document.getElementById('mago-nombre').value.trim().toUpperCase();
            if(!nom) return alert("Nombre vacío");
            jugadores.push({ 
                nombre: nom, elemento: elem, color: col, 
                slotsPuntos: 0, dadoRonda: 0, puntosTotales: 0, historico: [] 
            });
            document.getElementById('mago-nombre').value = "";
            if(jugadores.length === cantJugadores) { 
                document.getElementById('p-setup').classList.add('oculto'); 
                document.getElementById('ui-juego').classList.remove('oculto'); 
                iniciarPartida(); 
            }
        };

        function iniciarPartida() {
            actualizarUI();
            iniciarOjo('container-ar', (carta) => {
                cartaActual = carta;
                document.getElementById('guia-scanner').className = "verde";
                setTimeout(() => document.getElementById('guia-scanner').className = "", 600);
                document.getElementById('msg-visor').innerHTML = `<span style="letter-spacing:1px;">${carta.nombre}</span>`;
                ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
                    const v = document.getElementById(id.replace('btn-', 'val-'));
                    v.innerText = carta.botones[id].valor;
                    v.className = "valor-flotante " + (carta.tipo==='CASA'?'neon-blanco':'neon-violeta');
                });
            });
        }

        function actualizarUI() {
            const j = jugadores[turnoIdx];
            document.getElementById('txt-turno').innerText = `TURNO: ${j.nombre}`;
            document.getElementById('txt-turno').style.color = j.color;
            document.getElementById('slot-indicator').innerText = `${slotActual + 1}/${MAX_SLOTS}`;
            document.getElementById('txt-vuelta').innerText = `ROUND: ${vueltaActual} / ${MAX_VUELTAS}`;
        }

        window.forzarReescaneo = () => { 
            cartaActual = null; resetUltimoId(); 
            document.getElementById('msg-visor').innerText = "SCAN"; 
            ['val-i', 'val-a', 'val-t', 'val-m'].forEach(v => { 
                document.getElementById(v).innerText = ""; 
            }); 
        };

        ['btn-i', 'btn-a', 'btn-t', 'btn-m'].forEach(id => {
            document.getElementById(id).onclick = () => {
                if(!cartaActual) return;
                const conf = cartaActual.botones[id];
                jugadaPendiente = { val: conf.valor };
                const v = document.getElementById('video-action'); 
                v.style.display = 'block'; v.src = RUTA_BASE + conf.video; v.play();
                document.getElementById('hud-derecho').style.display = 'flex';
                document.getElementById('hud-img-escudo').src = RUTA_BASE + cartaActual.imgEscudo;
                document.getElementById('hud-txt-arma').innerText = cartaActual.nombre;
                document.getElementById('hud-txt-valor').innerText = conf.valor;
                v.onended = () => { v.style.display = 'none'; document.getElementById('hud-derecho').style.display = 'none'; };
            };
        });

        document.getElementById('btn-confirmar').onclick = () => {
            if(!jugadaPendiente) return alert("Selecciona gema");
            jugadores[turnoIdx].slotsPuntos += jugadaPendiente.val;
            jugadaPendiente = null; turnoIdx++;
            if(turnoIdx >= cantJugadores) { turnoIdx = 0; slotActual++; if(slotActual >= MAX_SLOTS) { window.iniciarFaseDados(); return; } }
            actualizarUI(); window.forzarReescaneo();
        };

        window.iniciarFaseDados = () => {
            document.getElementById('ui-juego').classList.add('oculto');
            document.getElementById('modal-dados-fase').classList.remove('oculto');
            document.getElementById('layer-valor-batalla').innerText = ""; 
            document.getElementById('dados-player-name').innerText = jugadores[diceIdx].nombre;
            document.getElementById('dados-player-name').style.color = jugadores[diceIdx].color;
            [1,2,3,4,5].forEach(i => document.getElementById('btn-batalla-'+i).classList.remove('tageado'));
        };

        window.ejecutarLanzamientoBatalla = (n) => {
            [1,2,3,4,5].forEach(i => document.getElementById('btn-batalla-'+i).classList.remove('tageado'));
            const btn = document.getElementById('btn-batalla-'+n);
            if(btn) btn.classList.add('tageado');

            const vid = document.getElementById('video-dados-batalla');
            const res = document.getElementById('layer-valor-batalla');
            res.innerText = ""; 
            vid.play();
            vid.onended = () => {
                let suma = 0; for(let i=0; i<n; i++) suma += Math.floor(Math.random()*6)+1;
                res.innerText = suma;
                jugadores[diceIdx].dadoRonda = suma;
                setTimeout(() => {
                    diceIdx++;
                    if(diceIdx < cantJugadores) { 
                        window.iniciarFaseDados(); 
                    } else { 
                        document.getElementById('modal-dados-fase').classList.add('oculto'); 
                        mostrarResultados();
                    }
                }, 3000);
            };
        };

        function mostrarResultados() {
            const cont = document.getElementById('resultado-contenido');
            cont.innerHTML = "";
            jugadores.forEach(j => {
                const totalRonda = j.slotsPuntos + j.dadoRonda;
                j.puntosTotales += totalRonda;
                j.historico.push(totalRonda);
                let papiros = j.historico.map(h => `<div class="papiro-ronda" style="margin-right:5px;">${h}</div>`).join('');
                cont.innerHTML += `
                    <div class="resultado-jugador" style="margin-bottom:20px; padding:15px; border-bottom:3px solid ${j.color};">
                        <div style="color:${j.color}; font-size:30px; font-weight:900; margin-bottom:10px;">${j.nombre}</div>
                        <div style="color:#000; font-weight:900; display:flex; justify-content:space-between; margin-bottom:5px;"><span>CARTAS:</span> <span>${j.slotsPuntos}</span></div>
                        <div style="color:#000; font-weight:900; display:flex; justify-content:space-between; margin-bottom:5px;"><span>DADOS:</span> <span>${j.dadoRonda}</span></div>
                        <div style="font-size:28px; color:#000; font-weight:900; margin:10px 0;">TOTAL: ${j.puntosTotales}</div>
                        <div style="display:flex; flex-direction:row; overflow-x:auto; padding:10px 0;">${papiros}</div>
                    </div>`;
            });
            if(vueltaActual >= MAX_VUELTAS) {
                const ganador = jugadores.reduce((a, b) => a.puntosTotales > b.puntosTotales ? a : b);
                document.getElementById('resultado-ganador').style.display = 'block';
                document.getElementById('txt-ganador-final').innerText = ganador.nombre;
                document.getElementById('txt-ganador-final').style.color = ganador.color;
            }
            document.getElementById('p-resultado').classList.remove('oculto');
        }

        window.continuarContienda = () => {
            if(vueltaActual >= MAX_VUELTAS) return location.reload();
            vueltaActual++; slotActual = 0; turnoIdx = 0; diceIdx = 0;
            jugadores.forEach(j => { j.slotsPuntos = 0; j.dadoRonda = 0; });
            document.getElementById('p-resultado').classList.add('oculto');
            document.getElementById('ui-juego').classList.remove('oculto');
            window.forzarReescaneo(); actualizarUI();
        };
    </script>
</body>
</html>
