<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMUS MAGI - CATÁLOGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #1a1a1a;
            font-family: 'Cinzel', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #flipbook-container {
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: clamp(50px, 10vw, 80px) 10px 10px 10px;
            gap: 10px;
        }

        #flipbook-image {
            width: 100%;
            max-width: 95vw;
            height: auto;
            max-height: calc(100vh - 150px);
            object-fit: contain;
            border: 3px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(8px, 3vw, 12px);
            margin-top: auto;
            width: 100%;
            flex-wrap: nowrap;
            padding: 0 10px;
        }

        button {
            background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
            border: 2px solid #d4af37;
            color: #ffd700;
            padding: clamp(8px, 2vw, 10px) clamp(12px, 3vw, 18px);
            font-size: clamp(12px, 3vw, 14px);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #000;
            white-space: nowrap;
            flex: 1;
            max-width: 140px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #ffd700;
            font-size: clamp(10px, 2.5vw, 12px);
            font-weight: 700;
            text-shadow: 1px 1px 3px #000;
            text-align: center;
            flex: 0 0 auto;
            min-width: 70px;
            word-wrap: break-word;
        }

        .back-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #500;
            border-color: #fff;
            color: #fff;
            padding: clamp(6px, 2vw, 8px) clamp(8px, 2vw, 12px);
            font-size: clamp(10px, 2vw, 12px);
            max-width: 90px;
            z-index: 100;
        }

        .back-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }

        /* Responsive */
        @media (max-width: 480px) {
            #flipbook-container {
                padding: 50px 8px 8px 8px;
            }

            button {
                max-width: 110px;
            }

            .page-info {
                min-width: 60px;
            }

            .controls {
                gap: 6px;
            }
        }

        @media (max-width: 360px) {
            #flipbook-container {
                padding: 45px 6px 6px 6px;
            }

            button {
                padding: 6px 8px;
                font-size: 11px;
            }

            .page-info {
                font-size: 9px;
                min-width: 55px;
            }

            .controls {
                gap: 4px;
            }

            .back-btn {
                padding: 4px 6px;
                font-size: 10px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div id="flipbook-container">
        <button class="back-btn" onclick="volverMenu()">← VOLVER</button>

        <img id="flipbook-image" src="00.jpg" alt="Catálogo Domus Magi">

        <div class="controls">
            <button id="prev-btn" onclick="paginaAnterior()">◀ ANT</button>
            <div class="page-info">
                <span id="page-number">Portada</span>
            </div>
            <button id="next-btn" onclick="paginaSiguiente()">SIG ▶</button>
        </div>
    </div>

    <script>
        const pages = [
            { num: 0, name: '00.jpg', title: 'Portada' },
            { num: 1, name: '1.jpg', title: 'Pack 1' },
            { num: 2, name: '2.jpg', title: 'Tierra' },
            { num: 3, name: '3.jpg', title: 'Tierra' },
            { num: 4, name: '4.jpg', title: 'Tierra' },
            { num: 5, name: '5.jpg', title: 'Cielo' },
            { num: 6, name: '6.jpg', title: 'Cielo' },
            { num: 7, name: '7.jpg', title: 'Agua' },
            { num: 8, name: '8.jpg', title: 'Agua' },
            { num: 9, name: '9.jpg', title: 'Magia' },
            { num: 10, name: '10.jpg', title: 'Magia' },
            { num: 11, name: '11.jpg', title: 'Artefactos' },
            { num: 12, name: '12.jpg', title: 'Pociones' },
            { num: 13, name: '13.jpg', title: 'Búhos' },
            { num: 14, name: '14.jpg', title: 'Zonas' },
            { num: 15, name: '15.jpg', title: 'Zonas' },
            { num: 16, name: '16.jpg', title: 'Zonas' },
            { num: 17, name: '17.jpg', title: 'Zonas' },
            { num: 18, name: '18.jpg', title: 'Zonas' },
            { num: 19, name: '19.jpg', title: 'Auxiliares' },
            { num: 20, name: '20.jpg', title: 'Auxiliares' },
        ];

        let currentPage = 0;

        const flipImg = document.getElementById('flipbook-image');
        const pageNum = document.getElementById('page-number');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function actualizarPagina() {
            flipImg.src = pages[currentPage].name;
            pageNum.textContent = `${pages[currentPage].title} (${currentPage + 1}/${pages.length})`;
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
        }

        function paginaSiguiente() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                actualizarPagina();
            }
        }

        function paginaAnterior() {
            if (currentPage > 0) {
                currentPage--;
                actualizarPagina();
            }
        }

        function volverMenu() {
            window.location.href = 'index.html';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') paginaSiguiente();
            if (e.key === 'ArrowLeft') paginaAnterior();
        });

        actualizarPagina();
    </script>
</body>
</html>
