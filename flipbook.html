<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DOMUS MAGI - CATÁLOGO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #flipbook-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #flipbook-image {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border: 3px solid #d4af37;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s ease;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(to bottom, #3a3a3a, #1a1a1a);
            border: 2px solid #d4af37;
            color: #ffd700;
            padding: 12px 25px;
            font-size: 16px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            box-shadow: 0 4px 0 #000;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            color: #ffd700;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 1px 1px 3px #000;
            min-width: 150px;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #500;
            border-color: #fff;
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
        }

        .zoom-controls {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .controls {
                gap: 10px;
                margin-top: 10px;
            }

            button {
                padding: 10px 15px;
                font-size: 14px;
            }

            .page-info {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="flipbook-container">
        <button class="back-btn" onclick="volverMenu()">← VOLVER</button>
        
        <img id="flipbook-image" src="00.jpg" alt="Catálogo Domus Magi">
        
        <div class="controls">
            <button id="prev-btn" onclick="paginaAnterior()">◀ ANTERIOR</button>
            <div class="page-info">
                <span id="page-number">Portada</span>
            </div>
            <button id="next-btn" onclick="paginaSiguiente()">SIGUIENTE ▶</button>
        </div>

        <div class="controls">
            <div class="zoom-controls">
                <button onclick="zoomOut()">🔍−</button>
                <button onclick="resetZoom()">100%</button>
                <button onclick="zoomIn()">🔍+</button>
            </div>
        </div>
    </div>

    <script>
        const pages = [
            { num: 0, name: '00.jpg', title: 'Portada' },
            { num: 1, name: '1.jpg', title: 'Pack 1 - Tierra vs Cielo' },
            { num: 2, name: '2.jpg', title: 'Cartas Tierra (001-008)' },
            { num: 3, name: '3.jpg', title: 'Cartas Tierra (009-020)' },
            { num: 4, name: '4.jpg', title: 'Cartas Tierra (021-024)' },
            { num: 5, name: '5.jpg', title: 'Cartas Cielo (025-040)' },
            { num: 6, name: '6.jpg', title: 'Cartas Cielo (025-040) cont.' },
            { num: 7, name: '7.jpg', title: 'Cartas Agua (041-060)' },
            { num: 8, name: '8.jpg', title: 'Cartas Agua (049-060)' },
            { num: 9, name: '9.jpg', title: 'Cartas Magia (061-080)' },
            { num: 10, name: '10.jpg', title: 'Cartas Magia (065-080)' },
            { num: 11, name: '11.jpg', title: 'Artefactos (081-089)' },
            { num: 12, name: '12.jpg', title: 'Pociones y Búhos (090-104)' },
            { num: 13, name: '13.jpg', title: 'Búhos (099-108)' },
            { num: 14, name: '14.jpg', title: 'Zonas (109-116)' },
            { num: 15, name: '15.jpg', title: 'Zonas (113-120)' },
            { num: 16, name: '16.jpg', title: 'Zonas (121-128)' },
            { num: 17, name: '17.jpg', title: 'Zonas (127-136)' },
            { num: 18, name: '18.jpg', title: 'Zonas (137-144)' },
            { num: 19, name: '19.jpg', title: 'Cartas Auxiliares (145-152)' },
            { num: 20, name: '20.jpg', title: 'Cartas Auxiliares (153-160)' },
        ];

        let currentPage = 0;
        let currentZoom = 1;

        const flipImg = document.getElementById('flipbook-image');
        const pageNum = document.getElementById('page-number');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function actualizarPagina() {
            flipImg.src = pages[currentPage].name;
            pageNum.textContent = `${pages[currentPage].title} (${currentPage + 1}/${pages.length})`;
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
        }

        function paginaSiguiente() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                resetZoom();
                actualizarPagina();
            }
        }

        function paginaAnterior() {
            if (currentPage > 0) {
                currentPage--;
                resetZoom();
                actualizarPagina();
            }
        }

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.2, 3);
            flipImg.style.transform = `scale(${currentZoom})`;
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.2, 1);
            flipImg.style.transform = `scale(${currentZoom})`;
        }

        function resetZoom() {
            currentZoom = 1;
            flipImg.style.transform = `scale(1)`;
        }

        function volverMenu() {
            window.location.href = 'index.html';
        }

        // Teclado: Flechas para navegar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') paginaSiguiente();
            if (e.key === 'ArrowLeft') paginaAnterior();
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-') zoomOut();
        });

        // Inicializar
        actualizarPagina();
    </script>
</body>
</html>
